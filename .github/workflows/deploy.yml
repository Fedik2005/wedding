name: Deploy with secrets

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create config.js with secrets
        run: |
          echo "const TELEGRAM_TOKEN = '${{ secrets.TELEGRAM_TOKEN }}';" > config.js
          echo "const TELEGRAM_CHAT_ID = '${{ secrets.TELEGRAM_CHAT_ID }}';" >> config.js
          echo "✅ config.js создан!"
          cat config.js  # Показываем содержимое (для проверки)
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
